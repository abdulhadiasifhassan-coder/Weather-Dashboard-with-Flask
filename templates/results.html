<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Results Page</title>
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles/results.css') }}">
        <link rel="preconnect" href="https://fonts.gstatic.com">
        <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="weatherResults">
            <h1>Weather in {{location}}</h1>
            <h2>Temperature: {{ temp }}°C</h2>
            <h3>Weather: {{ weather }}</h3>
            <h4>Feels like: {{ feels_like }}°C</h4>
            <h3>Humidity: {{ humidity }}%</h3>
            <h4>Wind Speed: {{ wind_speed }} km/hr</h4>
            <a href="/" class="btn">Back to Home Page</a>
        </div>
    </body>
</html>
